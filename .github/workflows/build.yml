name: Build travel guide

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install LibreOffice and Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice fonts-noto-cjk

      - name: Build PowerPoint and fallback PDF
        run: python scripts/build_guide.py

      - name: Convert PowerPoint to PDF with LibreOffice
        run: |
          libreoffice --headless --convert-to pdf --outdir output output/hokkaido-family-travel-guide.pptx
          test -f output/hokkaido-family-travel-guide.pdf

      - name: Verify generated files
        run: |
          python - <<'PY'
          from pathlib import Path
          from pptx import Presentation
          pptx = Path("output/hokkaido-family-travel-guide.pptx")
          pdf = Path("output/hokkaido-family-travel-guide.pdf")
          assert pptx.exists() and pptx.stat().st_size > 0
          assert pdf.exists() and pdf.stat().st_size > 0
          prs = Presentation(pptx)
          assert len(prs.slides) >= 5
          print(f"slides={len(prs.slides)} pdf_bytes={pdf.stat().st_size}")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hokkaido-family-travel-guide
          path: output/

