name: Build travel guide

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install LibreOffice and Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice fonts-noto-cjk

      - name: Build PowerPoint and fallback PDF
        run: |
          python scripts/build_guide.py
          python scripts/build_web_data.py
          python scripts/build_public_site.py

      - name: Convert PowerPoint to PDF with LibreOffice
        run: |
          libreoffice --headless --convert-to pdf --outdir output output/hokkaido-family-travel-guide.pptx
          test -f output/hokkaido-family-travel-guide.pdf

      - name: Build HTML guide
        working-directory: web
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run build

      - name: Verify generated files
        run: |
          python - <<'PY'
          from pathlib import Path
          from pptx import Presentation
          pptx = Path("output/hokkaido-family-travel-guide.pptx")
          pdf = Path("output/hokkaido-family-travel-guide.pdf")
          web_data = Path("web/app/itinerary-data.ts")
          public_html = Path("docs/index.html")
          assert pptx.exists() and pptx.stat().st_size > 0
          assert pdf.exists() and pdf.stat().st_size > 0
          assert web_data.exists() and web_data.stat().st_size > 0
          assert public_html.exists() and public_html.stat().st_size > 0
          prs = Presentation(pptx)
          assert len(prs.slides) >= 5
          html = public_html.read_text(encoding="utf-8")
          assert "日別サマリ一覧" in html
          assert "時刻表" in html
          assert "詳細を見る" in html
          print(f"slides={len(prs.slides)} pdf_bytes={pdf.stat().st_size}")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hokkaido-family-travel-guide
          path: output/
